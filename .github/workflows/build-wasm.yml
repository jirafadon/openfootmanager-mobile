name: Build WASM & Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'src-tauri/crates/**'
      - 'src/wasm/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/wasm/ofm_engine_wasm/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('src/wasm/ofm_engine_wasm/Cargo.toml', 'src-tauri